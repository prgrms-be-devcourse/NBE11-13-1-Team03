<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/admin.css">
  <title>관리자 - 주문 관리</title>
</head>
<body class="container-fluid p-4" style="max-width: 1100px; margin: auto;">
<h1 class="mb-4">주문 관리</h1>

<div class="card p-3 mb-3">
  <h5>검색</h5>
  <div class="row g-2 align-items-end">
    <div class="col-md-3">
      <label class="form-label">이메일</label>
      <input type="text" class="form-control" id="filter-email" placeholder="customer@example.com">
    </div>
    <div class="col-md-3">
      <label class="form-label">상태</label>
      <select class="form-select" id="filter-status">
        <option value="">전체</option>
        <option value="ORDERED">ORDERED</option>
        <option value="SHIPPING">SHIPPING</option>
        <option value="DELIVERED">DELIVERED</option>
        <option value="CANCELED">CANCELED</option>
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">메뉴명</label>
      <input type="text" class="form-control" id="filter-menuName" placeholder="메뉴명">
    </div>
    <div class="col-md-3">
      <button type="button" class="btn btn-dark w-100" id="search-btn">조회</button>
    </div>
  </div>
</div>

<div class="card p-3 mb-3">
  <h5>주문번호로 단건 조회</h5>
  <div class="row g-2 align-items-end">
    <div class="col-md-3">
      <label class="form-label">주문번호</label>
      <input type="number" class="form-control" id="lookup-orderId" placeholder="orderId">
    </div>
    <div class="col-md-3">
      <button type="button" class="btn btn-outline-dark w-100" id="lookup-btn">조회</button>
    </div>
  </div>
</div>

<div id="error-message" class="alert alert-danger"></div>

<div class="card p-3">
  <table class="table table-sm align-middle">
    <thead>
    <tr>
      <th>주문번호</th>
      <th>이메일</th>
      <th>배송지</th>
      <th>주문 내역</th>
      <th class="text-end">총금액</th>
      <th>상태</th>
      <th>상태 변경</th>
    </tr>
    </thead>
    <tbody id="order-table-body">
    </tbody>
  </table>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
